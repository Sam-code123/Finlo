<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Finlo</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--sur:#FFFFFF;--sur2:#F0EDE6;--bor:#E5E1D8;--tx:#1A1814;--tx2:#6B6760;--tx3:#A8A49E;--gr:#2D5A3D;--grl:#EAF3DE;--am:#C4873A;--aml:#FDF3E3;--re:#B84040;--rel:#FCEDED;--ra:14px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--tx);font-size:15px}

/* AUTH */
#auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem}
.alogo{font-family:'Fraunces',serif;font-size:40px;font-weight:300;color:var(--gr);letter-spacing:-1px;margin-bottom:4px}
.atag{font-size:12px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2.5rem}
.acard{background:var(--sur);border:1px solid var(--bor);border-radius:var(--ra);padding:1.75rem;width:100%;max-width:380px}
.anote{background:var(--grl);border:1px solid var(--gr);border-radius:var(--rs);padding:.65rem .9rem;font-size:12px;color:var(--gr);margin-bottom:1.25rem;line-height:1.5}
.atabs{display:flex;border:1px solid var(--bor);border-radius:var(--rs);overflow:hidden;margin-bottom:1.25rem}
.atab{flex:1;padding:9px;font-family:'DM Sans',sans-serif;font-size:13px;border:none;background:transparent;color:var(--tx2);cursor:pointer}
.atab.on{background:var(--gr);color:#fff}
.fl{margin-bottom:1rem}
.fl label{display:block;font-size:11px;color:var(--tx2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.fl input{width:100%;padding:10px 12px;border:1px solid var(--bor);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--tx);outline:none;-webkit-appearance:none}
.fl input:focus{border-color:var(--gr)}
.abtn{width:100%;padding:12px;background:var(--gr);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:.5rem;-webkit-appearance:none}
.abtn:active{opacity:.85}
.amsg{font-size:12px;margin-top:8px;text-align:center;min-height:18px}
.amsg.err{color:var(--re)}
.amsg.ok{color:var(--gr)}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
#app.on{display:flex}
.topbar{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 1.25rem;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.tlogo{font-family:'Fraunces',serif;font-size:22px;font-weight:300;color:var(--gr);letter-spacing:-.5px;flex:1}
.tuser{display:flex;align-items:center;gap:8px}
.tname{font-size:13px;color:var(--tx2)}
.tav{width:32px;height:32px;border-radius:50%;background:var(--gr);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.tout{font-size:12px;color:var(--tx3);background:none;border:1px solid var(--bor);border-radius:20px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.tout:active{color:var(--re);border-color:var(--re)}
.wrap{flex:1;padding:1.25rem;max-width:780px;margin:0 auto;width:100%;padding-bottom:85px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;gap:3px;background:none;border:none;cursor:pointer;color:var(--tx3);font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.5px;text-transform:uppercase}
.nb.on{color:var(--gr)}
.ni{font-size:18px}

/* PAGES */
.pg{display:none}
.pg.on{display:block;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}
